{% extends "shared/user_base.html" %}
{% block title %}My Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}
{% block content %}
    <form method="POST" action="{{ url_for('user.profile') }}" class="form-box">
        <div class="form-group">
            <label>Email (cannot be changed)</label>
            <input type="email" value="{{ user.email }}" disabled>
        </div>
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" name="full_name" id="full_name" value="{{ user.full_name }}" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" name="phone" id="phone" value="{{ user.phone or '' }}">
        </div>
        <div class="form-group">
            <label for="address">Address</label>
            <textarea name="address" id="address" rows="2">{{ user.address or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Update Profile</button>
    </form>
{% endblock %}
